# Description-trigger corpus for the skill-test harness.
# Each entry is a natural-language prompt and the bare skill name that
# should be routed when Claude sees only the active skills' `name` +
# `description:` fields. Lowercase phrasing mimics how users actually
# write. Expand this file when new mis-routes are discovered.

corpus:
  # --- al-dev-plan -------------------------------------------------------
  - prompt: "design how i'd build a sales-tax exemption feature"
    expected: al-dev-plan
  - prompt: "plan a refactor of the posting routines"
    expected: al-dev-plan
  - prompt: "architect a permission-set redesign"
    expected: al-dev-plan
  - prompt: "how should i approach building an item-template subsystem"
    expected: al-dev-plan
  - prompt: "i want to add jobs integration to sales orders, design it"
    expected: al-dev-plan

  # --- al-dev-develop ----------------------------------------------------
  - prompt: "implement the plan we just wrote"
    expected: al-dev-develop
  - prompt: "build out the codeunits from the solution plan in .dev/"
    expected: al-dev-develop
  - prompt: "write the al code for the plan"
    expected: al-dev-develop
  - prompt: "execute the implementation plan with review"
    expected: al-dev-develop
  - prompt: "scaffold the tables and pages from the design doc"
    expected: al-dev-develop

  # --- al-dev-develop (--autonomous mode) --------------------------------
  - prompt: "implement the plan automatically and keep compiling until it builds"
    expected: al-dev-develop
  - prompt: "autonomous mode: build the feature and self-correct compile errors"
    expected: al-dev-develop
  - prompt: "just keep iterating on the code until al-compile is clean"
    expected: al-dev-develop

  # --- al-dev-fix --------------------------------------------------------
  - prompt: "the customer page is throwing a permission error, fix it"
    expected: al-dev-fix
  - prompt: "patch the bug in the posting codeunit quickly"
    expected: al-dev-fix
  - prompt: "fast iteration: tweak the field length and recompile"
    expected: al-dev-fix
  - prompt: "small fix to a typo in a caption"
    expected: al-dev-fix

  # --- al-dev-commit -----------------------------------------------------
  - prompt: "squash these commits before pushing"
    expected: al-dev-commit
  - prompt: "commit the staged changes with a sensible message"
    expected: al-dev-commit
  - prompt: "wrap up and commit, watch for scope creep in the diff"
    expected: al-dev-commit
  - prompt: "i'm done — commit what's staged"
    expected: al-dev-commit

  # --- intent preflight and near-miss prompts -----------------------------
  - prompt: "review this usage report and suggest possible plugin improvements without editing files"
    expected: NONE
  - prompt: "audit the validation output and tell me what failed, do not plan implementation"
    expected: NONE
  - prompt: "assess whether these recommendations belong in the shared plugin"
    expected: NONE
  - prompt: "commit only the staged docs changes after checking scope"
    expected: al-dev-commit
  - prompt: "implement the approved plan in autonomous mode and keep compiling until it builds"
    expected: al-dev-develop

  # --- expected to route elsewhere or to NONE ----------------------------
  - prompt: "what is the current branch name"
    expected: NONE
  - prompt: "explain how the sales posting routine handles partial shipments"
    expected: al-dev-explore
  - prompt: "research a customer ticket about g/l setup"
    expected: al-dev-support

  # --- spec/plan/review clarification near-misses ---------------------------
  - prompt: "review this spec and tell me if it is ready to implement"
    artifact: design spec document
    expected_routing: NONE (clarify intent; review-only is not an implementation trigger)
    expected_response: "This spec is well-formed and covers requirements X, Y, Z. Are you ready for me to create a plan?"
    expected: NONE
    note: "clarify intent; review-only is not an implementation trigger"
  - prompt: "audit this plan for risk only"
    artifact: implementation plan
    expected_routing: NONE (clarify intent; audit-only is not an implementation trigger)
    expected_response: "I'll review this plan for risks without executing it. Here are my concerns: ..."
    expected: NONE
    note: "clarify intent; audit-only is not an implementation trigger"
  - prompt: "summarize the compile failures without fixing anything"
    artifact: code with compile errors
    expected_routing: NONE or al-dev-lint with REVIEW intent (diagnostic summary, not EDIT)
    expected_response: "The staged changes have X errors and Y warnings. Details: ... Should I fix these, or is this review-only?"
    expected: NONE
    note: "diagnostic summary, not EDIT intent; may route to al-dev-lint with REVIEW intent"
  - prompt: "here's my spec, implement it now"
    artifact: design spec document + "implement/execute" keyword
    expected_routing: Clarify whether user wants planning output (al-dev-plan) or direct implementation (al-dev-develop)
    expected_response: "I see you have a spec. Do you want me to create a detailed plan first, or jump straight to implementation?"
    expected: CLARIFY
    note: "clarify whether user wants planning output (al-dev-plan) or direct implementation (al-dev-develop)"
  - prompt: "review this plan and audit only"
    artifact: implementation plan + "review/audit only" keywords
    expected_routing: Treat as REVIEW (no implementation)
    expected_response: "I'll review this plan for completeness and risk. I won't execute it unless you confirm."
    expected: NONE
    note: "treat as REVIEW (no implementation); do not route to al-dev-develop"
