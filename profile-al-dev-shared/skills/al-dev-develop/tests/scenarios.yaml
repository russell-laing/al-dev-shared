skill: al-dev-develop
scenarios:
  - id: develop-implement-plan-with-full-panel
    status: golden
    user_prompt: "Implement the solution plan at .dev/2026-05-17-al-dev-plan-solution-plan.md."
    expected_artifacts:
      - ".dev/*-al-dev-develop-code-review.md"
    must_invoke_agent:
      - al-dev-shared:al-dev-developer
      - al-dev-shared:al-dev-security-reviewer
      - al-dev-shared:al-dev-expert-reviewer
      - al-dev-shared:al-dev-performance-reviewer
    notes: "Standard development path. Asserts the developer and all 3 reviewer specialists are dispatched. Plan file is a fixture — harness pre-seeds it before run."

  - id: develop-requires-plan
    status: golden
    user_prompt: "Implement a new tax-exemption feature."
    expected_artifacts: []
    notes: "No plan exists. Skill must refuse and direct the user to /al-dev-plan first; no AL files should be written."
