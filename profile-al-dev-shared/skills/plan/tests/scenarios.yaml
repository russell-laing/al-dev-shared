skill: plan
scenarios:
  - id: plan-new-feature
    status: golden
    user_prompt: "Design how I'd add a tax-exemption certificate validation feature to the Sales Order workflow."
    expected_artifacts: []
    must_invoke_agent: al-dev-shared:al-dev-solution-architect
    notes: "Phase A smoke: verifies MEDIUM/COMPLEX routing dispatches architect agents. Artifact production (plan file) is a Phase B assertion."

  - id: plan-trivial-routing
    status: golden
    user_prompt: "Plan a one-line fix to change a Caption from 'Cust' to 'Customer' on the Sales Header."
    expected_artifacts: []
    must_not_invoke_agent: al-dev-shared:al-dev-solution-architect
    notes: "Tests the TRIVIAL classification in workflow-routing.md — the skill should refuse to spin up architects for a one-line caption change."

  - id: plan-medium-refactor
    status: golden
    user_prompt: "Plan a refactor that splits the Sales Posting codeunit into 3 smaller codeunits along functional lines."
    expected_artifacts:
      - ".dev/*-plan-solution-plan.md"
    must_invoke_agent: al-dev-shared:al-dev-solution-architect
    notes: "MEDIUM-sized refactor — should still produce a competitive plan."

  - id: plan-rejects-validation-audit-misfire
    status: golden
    user_prompt: "Audit the validation output and summarize what failed. Do not create an implementation plan."
    expected_artifacts: []
    must_not_invoke_agent: al-dev-shared:al-dev-solution-architect
    notes: "Intent preflight regression. A validation-audit prompt is REVIEW intent and must not route to competitive implementation planning."
