skill: al-dev-commit
scenarios:
  - id: commit-staged-clean
    status: golden
    user_prompt: "Commit the staged changes."
    expected_artifacts: []
    must_invoke_agent:
      - al-dev-shared:al-dev-commit-agent-analysis
      - al-dev-shared:al-dev-commit-agent-execute
    notes: "Standard commit flow. Harness pre-seeds a small staged change (one-line edit to a fixture file) before the run."

  - id: commit-scope-creep-guard
    status: golden
    user_prompt: "Commit the staged changes."
    expected_artifacts: []
    must_invoke_agent:
      - al-dev-shared:al-dev-commit-agent-analysis
      - al-dev-shared:al-dev-commit-agent-execute
    notes: "Harness pre-seeds a deletion of an unrelated file. Skill must surface the unexpected deletion in its summary and gate on user confirmation — verified by transcript grep for 'unrelated' / 'scope' in the agent's final message."

  - id: commit-explicit-scoped-docs
    status: golden
    user_prompt: "Commit only the staged docs changes after checking scope."
    expected_artifacts: []
    must_invoke_agent:
      - al-dev-shared:al-dev-commit-agent-analysis
      - al-dev-shared:al-dev-commit-agent-execute
    notes: "Commit intent regression. Explicit scoped commit prompts must route to commit gates and commit agents, not edit or planning flows."

  - id: compile-gate-blocks-errors
    status: golden
    user_prompt: "Commit the staged changes."
    expected_artifacts:
      - .dev/compile-errors.log
    must_invoke_agent:
      - al-dev-shared:al-dev-commit-agent-analysis
    notes: "Compile gate regression. Harness pre-seeds staged .al files that contain compile errors. Skill must run Step 4a compile verification, read .dev/compile-errors.log, report the error count and up to 3 representative diagnostics, and halt before dispatching al-dev-commit-agent-execute — verified by transcript grep confirming 'not ready to commit' and absence of execute-agent invocation."

  - id: docs-only-skip-compile-gate
    status: golden
    user_prompt: "Commit the staged changes."
    expected_artifacts: []
    must_invoke_agent:
      - al-dev-shared:al-dev-commit-agent-analysis
      - al-dev-shared:al-dev-commit-agent-execute
    notes: "Docs-only optimization regression. Harness pre-seeds only non-AL staged changes (markdown and docs files, no .al files). Skill must confirm no .al files are staged, skip Step 4a compile verification entirely, and proceed to normal commit orchestration — verified by transcript confirming compile gate was not triggered and commit completed successfully."
