skill: plan-map-changes
scenarios:
  - id: trigger-main-entry-point
    status: golden
    user_prompt: "/plan-map-changes"
    expected_artifacts:
      - ".dev/plan-map-changes-runs/*/suggestion-queue.json"
      - ".dev/progress.md"
    notes: "Main entry point without arguments; should extract suggestions from both skill and agent maps, default filters to 'all'."

  - id: trigger-with-resume-flag
    status: golden
    user_prompt: "/plan-map-changes --resume"
    expected_artifacts: []
    notes: "Resume path after phase 2 team dispatch; skips extraction, goes directly to collection phase."

  - id: trigger-with-surface-agents-filter-trim
    status: golden
    user_prompt: "/plan-map-changes --surface agents --filter trim"
    expected_artifacts:
      - ".dev/plan-map-changes-runs/*/suggestion-queue.json"
      - ".dev/progress.md"
    notes: "Filtered extraction: only agents surface, only trim suggestions."

  - id: trigger-with-surface-skills
    status: golden
    user_prompt: "/plan-map-changes --surface skills"
    expected_artifacts:
      - ".dev/plan-map-changes-runs/*/suggestion-queue.json"
      - ".dev/progress.md"
    notes: "Skills surface only with all suggestion types."

  - id: trigger-with-filter-merge
    status: golden
    user_prompt: "/plan-map-changes --filter merge"
    expected_artifacts:
      - ".dev/plan-map-changes-runs/*/suggestion-queue.json"
      - ".dev/progress.md"
    notes: "Extract only merge-type suggestions from both surfaces."

  - id: trigger-both-surface-split-filter
    status: golden
    user_prompt: "/plan-map-changes --surface both --filter split"
    expected_artifacts:
      - ".dev/plan-map-changes-runs/*/suggestion-queue.json"
      - ".dev/progress.md"
    notes: "Explicit both surface with split filter."

  - id: no-trigger-plain-phrase
    status: golden
    user_prompt: "plan my changes"
    expected_artifacts: []
    notes: "Plain phrase without slash; skill should NOT be triggered."

  - id: no-trigger-how-question
    status: golden
    user_prompt: "how do I plan changes?"
    expected_artifacts: []
    notes: "Question form without slash; skill should NOT be triggered."

  - id: no-trigger-prefix-mismatch
    status: golden
    user_prompt: "/plan-map"
    expected_artifacts: []
    notes: "Prefix match should NOT trigger; must be exact /plan-map-changes invocation."
