skill: maintain-skill-naming-conventions
scenarios:
  - id: rename-misaligned-skill
    status: golden
    user_prompt: "This repo-local skill's name no longer matches what it actually does. Rename it and update the inventory docs so the intent is obvious."
    expected_artifacts:
      - ".codex/skills/maintain-skill-naming-conventions/SKILL.md"
      - "AGENTS.md"
      - "CODEX.md"
    notes: "Primary maintenance path: align the directory name, frontmatter, and root inventories."

  - id: fix-stale-inventory
    status: golden
    user_prompt: "The root docs still omit a live repo-local skill such as research-harness-improvements. Update AGENTS.md and CODEX.md so the inventory matches the live .codex/skills surface."
    expected_artifacts:
      - "AGENTS.md"
      - "CODEX.md"
    notes: "Checks that the skill keeps both inventories complete when a new repo-local maintainer skill is added."

  - id: preserve-aligned-name
    status: golden
    user_prompt: "The skill name already matches the task and the description clearly states the trigger. Leave it alone unless there is a real mismatch."
    expected_artifacts: []
    notes: "Confirms the skill does not expand into unnecessary renames."

  - id: remove-plugin-prefix
    status: golden
    user_prompt: "A repo-local skill starts with 'plugin-' even though the task is really about reviewing reports or doing a surface mini-heal. Rename it so the actual intent is obvious."
    expected_artifacts:
      - ".codex/skills/review-improvement-reports/SKILL.md"
      - ".codex/skills/heal-surface/SKILL.md"
    notes: "Catches misleading plugin-prefixed names in the local skill inventory."
