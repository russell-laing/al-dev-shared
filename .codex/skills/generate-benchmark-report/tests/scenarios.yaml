skill: generate-benchmark-report
scenarios:
  - id: claude-self-healing-baseline
    status: golden
    user_prompt: "Generate a Claude self-healing benchmark baseline report from recent docs/health artifacts, include token-efficiency findings, and include a final live-state validation loop before calling it ready."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must treat JSONL disposition views as canonical, preserve unavailable counts as not available, separate measured versus inferred token-efficiency claims, re-check live state after drafting, and distinguish recovery plumbing from governance controls."

  - id: patch-benchmark-after-live-drift
    status: golden
    user_prompt: "Draft the benchmark report, then re-run the live health checks and lower the loop-quality score if JSONL open rows or the legacy effective-open checker drifted during writing."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must explain the live-state validation loop, patch the report instead of leaving stale zero-open claims, and prefer validation-only when an existing draft already matches live evidence."

  - id: token-efficiency-without-measured-data
    status: golden
    user_prompt: "Create a benchmark baseline from historical health artifacts and discuss token efficiency, but do not invent token counts that are not present in the source evidence."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must record token efficiency as measured, inferred, or not available, and must not turn proxy evidence into fake exact token savings or self-healing design claims into measured recovery."

  - id: adapter-procedure-integrity-gates-scoring
    status: golden
    user_prompt: "Refresh the existing Claude self-healing benchmark report and only keep the loop-quality score clean if the benchmark adapter procedure_integrity checklist and health-loop-state validator both pass."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must run scripts/health_benchmark_adapter.py and scripts/validate_health_loop_state.py before scoring, cite adapter-backed procedure_integrity output, and patch or downgrade clean-closure claims when any checklist item fails."

  - id: delta-benchmark-after-deferred-recommendation
    status: golden
    user_prompt: "A deferred benchmark recommendation was implemented. Write the delta benchmark section for the existing Claude self-healing baseline."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Runs validator and adapter, re-reads the existing baseline, and appends a dated delta only when a health cycle completed, a deferred recommendation was implemented, or a score-relevant gate changed; must not rewrite the full baseline when a two-section delta is sufficient."
