skill: generate-benchmark-report
scenarios:
  - id: claude-self-healing-baseline
    status: golden
    user_prompt: "Generate a Claude self-healing benchmark baseline report from recent docs/health artifacts and include a final live-state validation loop before calling it ready."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must treat JSONL disposition views as canonical, preserve unavailable counts as not available, and re-check live state after drafting."

  - id: patch-benchmark-after-live-drift
    status: golden
    user_prompt: "Draft the benchmark report, then re-run the live health checks and lower the loop-quality score if JSONL open rows or the legacy effective-open checker drifted during writing."
    expected_artifacts:
      - "docs/reviews/*-benchmark-baseline.md"
    notes: "Must explain the live-state validation loop and patch the report instead of leaving stale zero-open claims."
