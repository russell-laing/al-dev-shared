    expect: no-trigger
    rationale: Diff review is /code-review, not a whole-surface scripts audit.
  - request: "are the documentation maps accurate?"
    expect: no-trigger
    rationale: Map accuracy is /sync-map-documentation.
  - request: "audit the knowledge files for stubs"
    expect: no-trigger
    rationale: Knowledge-quality is /audit-knowledge-quality.
